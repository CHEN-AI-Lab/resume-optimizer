name: Deploy

on:
  push:
    branches: [main]

jobs:
  quality:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "🚀 Deploy triggered. Vercel auto-deploys on main branch push."
      - run: echo "See https://vercel.com/dashboard for status."